<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="180" height="180" rx="40" fill="#0d1526"/>
  <rect width="180" height="180" rx="40" fill="url(#bgGrad)"/>

  <!-- Синяя полоска сверху -->
  <rect x="0" y="0" width="180" height="4" rx="2" fill="url(#topLine)"/>

  <!-- Иконка стрелки вверх-вниз (арбитраж) -->
  <g transform="translate(90, 72)">
    <!-- Стрелка вверх -->
    <path d="M0 -28 L-12 -10 L-5 -10 L-5 8 L5 8 L5 -10 L12 -10 Z" fill="#3b82f6"/>
    <!-- Стрелка вниз -->
    <path d="M22 28 L34 10 L27 10 L27 -8 L17 -8 L17 10 L10 10 Z" fill="#60a5fa" opacity="0.7"/>
  </g>

  <!-- Текст P2P -->
  <text x="90" y="130" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="28" fill="white" text-anchor="middle" letter-spacing="-1">P2P</text>

  <!-- Текст PROFIT маленький -->
  <text x="90" y="150" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#3b82f6" text-anchor="middle" letter-spacing="4">PROFIT</text>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f1f3d"/>
      <stop offset="100%" stop-color="#0d1526"/>
    </linearGradient>
    <linearGradient id="topLine" x1="0" y1="0" x2="180" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
</svg>
